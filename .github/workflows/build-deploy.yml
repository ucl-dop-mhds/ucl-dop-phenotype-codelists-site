name: Build and deploy site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  repository_dispatch:
    types: [codelists-updated]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout hub data repo
        uses: actions/checkout@v4
        with:
          repository: dop-mhds/ucl-dop-phenotype-codelists
          ref: main
          path: _data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render docs from hub
        run: |
          python scripts/render_site.py --data-repo _data --docs docs

      - name: Build site
        run: |
          mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
